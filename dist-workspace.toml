[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
# Windows is on the roadmap. ort 2.0.0-rc.10's bundled MSVC static lib has a
# CRT-linkage mismatch (73 unresolved __imp_ symbols at link time). Re-enable
# `x86_64-pc-windows-msvc` once we sort it (likely `+crt-static` or load-dynamic).
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# The Homebrew tap (org/homebrew-<name>) to push the generated formula to.
# Requires a personal-access-token secret named HOMEBREW_TAP_TOKEN in the repo.
# Create the empty `1612elphi/homebrew-delphitools` repo on GitHub before tagging.
tap = "1612elphi/homebrew-delphitools"
# Bundle these alongside the binary in each release archive.
include = ["LICENSE", "README.md"]
# When a PR is opened, just run `dist plan` (don't try to build artifacts).
pr-run-mode = "plan"
# Publish the Homebrew formula on every release.
publish-jobs = ["homebrew"]
